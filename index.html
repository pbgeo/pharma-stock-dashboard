<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>박약다식 재고 현황</title>
  <style>
    :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;background:#F8FAFC;color:#1E293B;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .header h1{font-size:18px;font-weight:700;color:#0F172A}
    .btn{padding:6px 12px;background:#3B82F6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
    .btn:hover{background:#2563EB}
    .date{font-size:12px;color:#64748B;margin-bottom:3px}
    .updated{font-size:11px;color:#94A3B8;margin-bottom:16px}
    .status{font-size:11px;margin-bottom:12px;min-height:16px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:white;border-radius:12px;padding:14px 12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #E2E8F0}
    .card h3{font-size:11px;font-weight:600;color:#374151;margin-bottom:10px;line-height:1.4;min-height:32px}
    .stats{display:flex;gap:5px;margin-bottom:8px}
    .stat{flex:1;text-align:center;background:#F8FAFC;border-radius:6px;padding:7px 2px}
    .stat .label{display:block;font-size:9px;color:#94A3B8;margin-bottom:2px}
    .stat .value{display:block;font-size:15px;font-weight:700}
    .stock{color:#1E40AF}.available{color:#059669}.assigned{color:#D97706}
    .expiry{font-size:10px;color:#92400E;background:#FEF3C7;padding:3px 6px;border-radius:4px;display:inline-block}
    .no-expiry{font-size:10px;color:#9CA3AF}
    .error{grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8}
    @media(min-width:640px){
      body{padding:24px;max-width:900px;margin:0 auto}
      .header h1{font-size:20px}.cards{gap:14px}
      .card{padding:18px}.card h3{font-size:13px;min-height:40px;margin-bottom:14px}
      .stat{padding:10px 4px}.stat .label{font-size:10px}.stat .value{font-size:18px}
      .expiry,.no-expiry{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📦 박약다식 재고</h1>
    <button class="btn" onclick="init()">🔄 새로고침</button>
  </div>
  <div class="date" id="date"></div>
  <div class="updated" id="updated"></div>
  <div class="status" id="status"></div>
  <div class="cards" id="cards"><div class="error">불러오는 중...</div></div>

  <script>
    const SHEET_ID = "1hVQZOo3MYhksqhsE6B4TFYUr997HgiDzo27zKVBNx2I";
    const GID = "0";
    const PRODUCTS = [
      "[박약다식] D를 담다 츄어블 2000IU",
      "[박약다식] 오늘도 맑아연",
      "(사은품) [박약다식] 리플랫",
      "(사은품) 하피도피 패치 클리어"
    ];

    function renderCards(items) {
      document.getElementById("cards").innerHTML = items.map(item => {
        const hasExpiry = item.유통기한 && item.유통기한 !== "0000-00-00";
        return `<div class="card">
          <h3>${item.item_name}</h3>
          <div class="stats">
            <div class="stat"><span class="label">재고</span><span class="value stock">${Number(item.재고수량).toLocaleString()}</span></div>
            <div class="stat"><span class="label">가용</span><span class="value available">${Number(item.가용수량).toLocaleString()}</span></div>
            <div class="stat"><span class="label">할당</span><span class="value assigned">${Number(item.할당수량).toLocaleString()}</span></div>
          </div>
          ${hasExpiry ? `<div class="expiry">📅 소비기한 ${item.유통기한}</div>` : `<div class="no-expiry">유통기한 없음</div>`}
        </div>`;
      }).join("");
    }

    async function fetchSheetData() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&t=${Date.now()}`;
      const resp = await fetch(url);
      const text = await resp.text();
      const rows = text.split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g,"").trim()));
      const updateDate = rows[2]?.[1]?.trim() || "";
      const items = [];
      for (const name of PRODUCTS) {
        const row = rows.find(r => r.length > 9 && r[2] === name || (name === "(사은품) 하피도피 패치 클리어" && r.join(",").includes("하피도피 패치 클리어")));
        if (row) {
          items.push({
            item_name: row[2],
            재고수량: parseInt(row[7]) || 0,
            가용수량: parseInt(row[8]) || 0,
            할당수량: parseInt(row[9]) || 0,
            유통기한: row[4] || ""
          });
        }
      }
      return {updateDate, items};
    }

    async function init() {
      document.getElementById("date").textContent = new Date().toLocaleDateString("ko-KR", {year:"numeric",month:"long",day:"numeric",weekday:"long"});
      document.getElementById("status").textContent = "🔄 구글시트에서 최신 데이터 불러오는 중...";
      try {
        const {updateDate, items} = await fetchSheetData();
        if (!items.length) throw new Error("데이터 없음");
        renderCards(items);
        document.getElementById("updated").textContent = `기준일: ${updateDate}`;
        document.getElementById("status").textContent = "";
      } catch(e) {
        document.getElementById("cards").innerHTML = `<div class="error">⚠️ 데이터를 불러올 수 없습니다</div>`;
        document.getElementById("status").textContent = "";
      }
    }

    init();
  </script>
</body>
</html>
