<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>박약다식 재고 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
  <style>
    :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic",sans-serif;background:#F8FAFC;color:#1E293B;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .header h1{font-size:18px;font-weight:700;color:#0F172A}
    .date{font-size:12px;color:#64748B;margin-bottom:3px}
    .updated{font-size:11px;color:#94A3B8;margin-bottom:16px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .card{background:white;border-radius:12px;padding:14px 12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #E2E8F0}
    .card h3{font-size:11px;font-weight:600;color:#374151;margin-bottom:10px;line-height:1.4;min-height:32px}
    .stats{display:flex;gap:5px;margin-bottom:8px}
    .stat{flex:1;text-align:center;background:#F8FAFC;border-radius:6px;padding:7px 2px}
    .stat .label{display:block;font-size:9px;color:#94A3B8;margin-bottom:2px}
    .stat .value{display:block;font-size:15px;font-weight:700}
    .stock{color:#1E40AF}.available{color:#059669}.assigned{color:#D97706}
    .expiry{font-size:10px;color:#92400E;background:#FEF3C7;padding:3px 6px;border-radius:4px;display:inline-block}
    .no-expiry{font-size:10px;color:#9CA3AF}
    .chart-section{background:white;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #E2E8F0}
    .chart-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:10px}
    @media(min-width:640px){
      body{padding:24px;max-width:900px;margin:0 auto}
      .header h1{font-size:20px}.cards{gap:14px;margin-bottom:20px}
      .card{padding:18px}.card h3{font-size:13px;min-height:40px;margin-bottom:14px}
      .stat{padding:10px 4px}.stat .label{font-size:10px}.stat .value{font-size:18px}
      .chart-section{padding:20px}
    }
  </style>
</head>
<body>
  <div class="header"><h1>📦 박약다식 재고</h1></div>
  <div class="date" id="date"></div>
  <div class="updated" id="updated"></div>
  <div class="cards" id="cards"></div>
  <div class="chart-section">
    <div class="chart-title">재고수량 추이</div>
    <canvas id="historyChart"></canvas>
  </div>
  <script>
    // __DATA_START__
    var HISTORY = [{"date": "2026-06-01", "items": [{"it_id": "202846000011", "item_name": "[박약다식] D를 담다 츄어블 2000IU", "재고수량": 3481, "가용수량": 3468, "할당수량": 13, "유통기한": "2028-03-08"}, {"it_id": "202846000078", "item_name": "[박약다식] 오늘도 맑아연", "재고수량": 22, "가용수량": 22, "할당수량": 0, "유통기한": "2028-04-05"}, {"it_id": "201068000139", "item_name": "(사은품) [박약다식] 리플랫", "재고수량": 3837, "가용수량": 3831, "할당수량": 6, "유통기한": ""}, {"it_id": "202846000079", "item_name": "(사은품) 하피도피 패치 클리어", "재고수량": 24, "가용수량": 24, "할당수량": 0, "유통기한": "2028-09-23"}]}, {"date": "2026-06-02", "items": [{"it_id": "201068000139", "item_name": "(사은품) [박약다식] 리플랫", "재고수량": 3831, "가용수량": 3831, "할당수량": 0, "유통기한": ""}, {"it_id": "202846000079", "item_name": "(사은품) 하피도피 패치 클리어", "재고수량": 24, "가용수량": 24, "할당수량": 0, "유통기한": "2028-09-23"}, {"it_id": "202846000011", "item_name": "[박약다식] D를 담다 츄어블 2000IU", "재고수량": 3468, "가용수량": 3468, "할당수량": 0, "유통기한": "2028-03-08"}, {"it_id": "202846000078", "item_name": "[박약다식] 오늘도 맑아연", "재고수량": 22, "가용수량": 22, "할당수량": 0, "유통기한": "2028-04-05"}]}];
    // __DATA_END__
    var COLORS={"202846000011":"#3B82F6","202846000078":"#10B981","201068000139":"#F59E0B","202846000079":"#EF4444"};
    var latest=HISTORY[HISTORY.length-1];
    document.getElementById("date").textContent=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
    document.getElementById("updated").textContent="기준일: "+latest.date;
    document.getElementById("cards").innerHTML=latest.items.map(function(item){
      var hasExpiry=item["유통기한"]&&item["유통기한"]!=="0000-00-00";
      return "<div class=\"card\"><h3>"+item.item_name+"</h3><div class=\"stats\">"+
        "<div class=\"stat\"><span class=\"label\">재고</span><span class=\"value stock\">"+Number(item["재고수량"]).toLocaleString()+"</span></div>"+
        "<div class=\"stat\"><span class=\"label\">가용</span><span class=\"value available\">"+Number(item["가용수량"]).toLocaleString()+"</span></div>"+
        "<div class=\"stat\"><span class=\"label\">할당</span><span class=\"value assigned\">"+Number(item["할당수량"]).toLocaleString()+"</span></div>"+
        "</div>"+(hasExpiry?"<div class=\"expiry\">📅 "+item["유통기한"]+"</div>":"<div class=\"no-expiry\">유통기한 없음</div>")+"</div>";
    }).join("");
    var isMobile=window.innerWidth<640;
    new Chart(document.getElementById("historyChart").getContext("2d"),{
      type:"line",
      data:{
        labels:HISTORY.map(function(d){return d.date;}),
        datasets:latest.items.map(function(p){
          return{
            label:p.item_name.replace(/\(사은품\)\s*/g,"").replace(/[\[\]]/g,"").substring(0,isMobile?12:20),
            data:HISTORY.map(function(d){var i=d.items.find(function(x){return x.it_id===p.it_id;});return i?i["재고수량"]:null;}),
            borderColor:COLORS[p.it_id]||"#6B7280",backgroundColor:"transparent",tension:0.3,pointRadius:isMobile?3:4
          };
        })
      },
      options:{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{size:isMobile?9:11},boxWidth:10}}},scales:{x:{ticks:{font:{size:isMobile?9:11}}},y:{beginAtZero:false,ticks:{font:{size:isMobile?9:11},callback:function(v){return v.toLocaleString();}}}}}
    });
  </script>
</body>
</html>
