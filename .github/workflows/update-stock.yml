name: 박약다식 재고 업데이트

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 설치
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: WMS 재고 수집
        env:
          WMS_ID: ${{ secrets.WMS_ID }}
          WMS_PW: ${{ secrets.WMS_PW }}
        run: node scraper.js > data_today.json

      - name: 디버그 스크린샷 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      - name: index.html 업데이트
        run: python3 update_data.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'actions@github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "재고 업데이트 $(date +%Y-%m-%d)"
          git push
